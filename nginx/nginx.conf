worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ------------------------------------------------------------------
    # Performance
    # ------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ------------------------------------------------------------------
    # WebSocket upgrade map
    # ------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ------------------------------------------------------------------
    # Upstream — C++ Crow backend
    # ------------------------------------------------------------------
    upstream cpp_backend {
        server app:8080;
        keepalive 32;
    }

    # ------------------------------------------------------------------
    # Server block — port 80
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"       always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header X-XSS-Protection       "1; mode=block"    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # --------------------------------------------------------------
        # WebSocket endpoints — /ws/*
        # --------------------------------------------------------------
        location /ws/ {
            proxy_pass http://cpp_backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep WebSocket connections open for up to 24 hours
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # --------------------------------------------------------------
        # REST API endpoints — /api/*
        # --------------------------------------------------------------
        location /api/ {
            proxy_pass http://cpp_backend;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Generous timeouts for large file downloads and long operations
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_connect_timeout 60s;
        }

        # --------------------------------------------------------------
        # SPA catch-all — everything else proxied to Crow
        # --------------------------------------------------------------
        location / {
            proxy_pass http://cpp_backend;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }
    }
}
