version: "3.9"

services:
  # --------------------------------------------------------------------------
  # C++ Application Server
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-dashboard
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - YOLO_DASHBOARD_PORT=8080
    restart: unless-stopped
    # -----------------------------------------------------------------------
    # Uncomment the following on Linux hosts with connected cameras / Hailo:
    devices:
      - /dev/video0:/dev/video0
    #   - /dev/video1:/dev/video1
    #   - /dev/hailo0:/dev/hailo0
    # -----------------------------------------------------------------------

  # --------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: yolo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
