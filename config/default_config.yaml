server:
  port: 8080
  host: "0.0.0.0"

camera:
  device_id: 0
  resolution: [640, 480]
  fps: 30

inference:
  mode: "cpu"
  model_path: ""
  confidence_threshold: 0.5
  nms_threshold: 0.45
  cpu_threads: 4

recording:
  enabled: false
  output_dir: "./data/recordings"
  codec: "avc1"
  annotated: true

logging:
  level: "info"
  file: "./data/logs/dashboard.log"
  max_size_mb: 50
  max_files: 5

metrics:
  export_interval_sec: 60
  output_dir: "./data/metrics"
  format: "json"

auth:
  username: "admin"
  password_hash: ""
  token_ttl_hours: 8
